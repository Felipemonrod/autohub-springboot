# ============================================================
#  AutoHub - Spring Boot Configuration
# ============================================================

spring.application.name=autohub

# --- DataSource SQLite ---
# A variavel DATASOURCE_URL pode ser sobrescrita via env no Docker
spring.datasource.url=${DATASOURCE_URL:jdbc:sqlite:autohub.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- Hibernate / JPA ---
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Servidor ---
server.port=8080

# --- Serialização JSON ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.locale=pt_BR

# --- Logging ---
logging.level.com.autohub=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
