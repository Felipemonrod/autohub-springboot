<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoHub - Plataforma Automotiva</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden flex h-screen">

  <!-- Mobile Sidebar Overlay -->
  <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden md:hidden" onclick="toggleSidebar(false)"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 flex flex-col transition-transform duration-300 -translate-x-full md:relative md:translate-x-0">
    <div class="p-6 flex items-center justify-between border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">AH</div>
        <span class="text-2xl font-bold text-white tracking-tight">AutoHub</span>
      </div>
      <button class="md:hidden text-slate-400 hover:text-white" onclick="toggleSidebar(false)">
        <i data-lucide="x" class="w-6 h-6"></i>
      </button>
    </div>

    <nav class="flex-1 py-6 flex flex-col gap-2 px-4 overflow-y-auto" id="nav-links">
      <!-- Links gerados pelo JS -->
    </nav>

    <div class="p-4 border-t border-slate-800 shrink-0">
      <div class="text-xs text-slate-500 mb-2 uppercase tracking-wider font-semibold">Simular Perfil</div>
      <select id="role-selector" class="w-full bg-slate-800 text-white rounded-md p-2 text-sm border-none focus:ring-2 focus:ring-blue-500 outline-none" onchange="changeRole(this.value)">
        <option value="cliente">Cliente (CPF)</option>
        <option value="oficina">Oficina (CNPJ)</option>
        <option value="loja">Loja de Peças (CNPJ)</option>
      </select>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 z-10 shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <button class="p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-lg md:hidden shrink-0" onclick="toggleSidebar(true)">
          <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <h1 id="page-title" class="text-lg md:text-xl font-semibold text-slate-800 capitalize truncate">Dashboard</h1>
      </div>

      <div class="flex items-center gap-4 shrink-0">
        <div class="relative hidden sm:block">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
          <input type="text" placeholder="Buscar no sistema..." class="pl-10 pr-4 py-2 bg-slate-100 border-transparent rounded-full text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all w-48 lg:w-64" onkeyup="if(event.key === 'Enter') showToast('Busca', 'Pesquisando por: ' + this.value)" />
        </div>

        <div class="flex items-center gap-2 md:gap-3 md:pl-4 sm:border-l border-slate-200 cursor-pointer hover:bg-slate-50 p-1 md:p-2 rounded-lg transition-colors" onclick="showToast('Perfil', 'Abrindo menu de perfil...')">
          <div class="w-8 h-8 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center shrink-0">
            <i data-lucide="user" class="w-5 h-5"></i>
          </div>
          <div class="flex flex-col hidden md:flex">
            <span id="user-name" class="text-sm font-medium leading-tight">João Silva</span>
            <span id="user-role-text" class="text-xs text-slate-500 capitalize">cliente</span>
          </div>
          <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 hidden sm:block"></i>
        </div>
      </div>
    </header>

    <!-- Dynamic View Area -->
    <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50 relative">
      <!-- Conteúdo inserido pelo JS -->
    </div>
  </main>

  <!-- Modals & Toasts -->
  <div id="modal-container"></div>
  <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2"></div>

  <script src="/js/app.js"></script>
</body>
</html>
